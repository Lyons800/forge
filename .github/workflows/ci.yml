name: ci
on: [push, pull_request]
jobs:
  gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      # CI-only non-secret values — rotate in prod via env secrets
      BETTER_AUTH_SECRET: ci-only-not-a-real-secret-000000000000000000000000000000000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm vitest run
      - run: pnpm db:migrate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test

  control-plane-guard:
    # Always runs (so it is a valid REQUIRED status check) but only ENFORCES on the
    # autonomous engine's claude/* PRs. Humans may change the control plane via review.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block agent edits to control-plane paths
        run: |
          chmod +x scripts/check-control-plane.sh
          HEAD_REF="${{ github.head_ref }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [[ "$HEAD_REF" == claude/* ]]; then
            echo "Agent PR ($HEAD_REF) — enforcing control-plane guard."
            git diff --name-status origin/${{ github.base_ref }}...HEAD | bash scripts/check-control-plane.sh --name-status
          else
            echo "Not an agent (claude/*) PR — control-plane guard not enforced (pass)."
          fi

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for --git-base diff against base branch

      - name: Block destructive schema migrations
        run: |
          chmod +x scripts/check-migrations.sh
          if [ -n "${{ github.base_ref }}" ]; then
            # Pull request: only check migrations added in this PR vs base branch
            bash scripts/check-migrations.sh --git-base "${{ github.base_ref }}"
          else
            # Direct push to branch: scan all migrations added since main (default mode —
            # no unsupported flags; the script's no-arg path handles git-log diff or falls
            # back to scanning all migration files when no base is determinable)
            bash scripts/check-migrations.sh
          fi
